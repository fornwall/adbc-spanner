# cargo-deny configuration — supply-chain checks (advisories, licenses, bans, sources).
# Run locally with `cargo deny check`; enforced in CI.

[graph]
all-features = true

[advisories]
# Fail on security vulnerabilities; only warn on yanked crates (the transitive tree occasionally
# pins a yanked patch release we don't control).
yanked = "warn"
ignore = []

[licenses]
# Permissive licenses present in the dependency tree. The AND-heavy expression from `aws-lc-sys`
# requires ISC + Apache-2.0 + MIT + BSD-3-Clause to all be allowed.
allow = [
    "Apache-2.0",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.9
# The allow list is intentionally forward-compatible; don't warn about entries not currently hit.
unused-allowed-license = "allow"

[bans]
# The tree resolves multiple versions of some common crates; report but don't fail.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The google-cloud-* crates are pinned to this git repo until Type::struct_type() is released;
# the adbc_* crates until the error-release / rows_affected / error-compat fixes ship (see Cargo.toml).
allow-git = [
    "https://github.com/googleapis/google-cloud-rust",
    "https://github.com/apache/arrow-adbc",
]
