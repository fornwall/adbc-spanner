name: Setup Rust
description: >
  Install the Rust toolchain pinned in rust-toolchain.toml — the single source of truth for the
  driver's Rust version — through a SHA-pinned dtolnay/rust-toolchain. Callers may add extra
  rustup components/targets. (fuzz.yml deliberately does not use this; it runs on nightly.)

inputs:
  components:
    description: Comma-separated extra rustup components to install (e.g. "rustfmt, clippy").
    required: false
    default: ""
  targets:
    description: Comma-separated extra rustup target triples to install.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve pinned Rust version
      id: version
      shell: bash
      run: |
        # rust-toolchain.toml is the single source of truth for the version, but
        # dtolnay/rust-toolchain can't read that file, so extract the channel and pass it
        # explicitly below. Use sed (not `grep -P`) so this also works on the BSD userland of the
        # macOS runners.
        channel=$(sed -n 's/^channel *= *"\([^"]*\)".*/\1/p' rust-toolchain.toml)
        if [ -z "$channel" ]; then
          echo "::error::could not read 'channel' from rust-toolchain.toml" >&2
          exit 1
        fi
        echo "channel=$channel" >> "$GITHUB_OUTPUT"

    - name: Install Rust toolchain
      # Third-party actions are pinned to a commit SHA (first-party actions/* stay on their major
      # tag) — a hijacked mutable tag would otherwise run in CI with repo read access. dtolnay/
      # rust-toolchain reads the toolchain from its ref name, so pinning the SHA requires selecting
      # the toolchain explicitly (done here from rust-toolchain.toml). Trailing comment names the ref.
      uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, 2026-06-30
      with:
        toolchain: ${{ steps.version.outputs.channel }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
