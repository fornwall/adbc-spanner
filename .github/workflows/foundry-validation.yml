name: Foundry validation

# The ADBC Driver Foundry validation suite (adbc-drivers/validation) as a type/feature coverage
# harness. Gating: the Spanner-dialect overrides under foundry-validation/queries/spanner/ cover
# the whole corpus (every case passes or skips with a reason — no expected failures; see
# foundry-validation/README.md). The canonical Apache C++ conformance suite runs in
# adbc-validation.yml.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded PR runs (a rapid re-push cancels the in-flight run for the same
# ref); pushes to main are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  foundry-validation:
    name: Foundry validation (emulator)
    runs-on: ubuntu-latest

    services:
      spanner:
        image: gcr.io/cloud-spanner-emulator/emulator
        ports:
          - 9010:9010
          - 9020:9020

    env:
      SPANNER_EMULATOR_HOST: localhost:9010
      # Fail the job if the suite runs but exercises no real coverage — i.e. every
      # collected case was skipped/errored rather than actually passing — so a broken
      # harness can't masquerade as an all-expected-dialect-skips green run. Enforced
      # by pytest_sessionfinish in foundry-validation/tests/conftest.py.
      FOUNDRY_VALIDATION_REQUIRE_PASSES: "1"
      # Pin *which* cases skip against foundry-validation/skip_baseline.txt, so a
      # suite-ref bump can't silently slip a new case into skip (no coverage) or
      # leave a now-passing case silently skipped. Fails the job on either drift;
      # regenerate the baseline with FOUNDRY_UPDATE_SKIP_BASELINE=1. Also enforced by
      # pytest_sessionfinish in foundry-validation/tests/conftest.py.
      FOUNDRY_VALIDATION_CHECK_SKIP_BASELINE: "1"

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v6
        with:
          # adbc-drivers-validation requires Python >= 3.13.
          python-version: "3.13"

      - name: Wait for the Spanner emulator
        run: |
          for _ in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' \
                http://127.0.0.1:9020/v1/projects/emulator/instanceConfigs)" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "emulator did not become ready" >&2
          exit 1

      - name: Run the Foundry validation suite
        run: PYTHON=python scripts/run-foundry-validation.sh
