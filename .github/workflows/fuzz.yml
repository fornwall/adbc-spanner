name: Fuzz

# Fuzzing is expensive, so it runs on a schedule (and on demand) rather than on every push.
# Each target gets a short smoke run; the corpus is not persisted here.
on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to fuzz each target"
        default: "120"

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [sql, values, like]
    steps:
      - uses: actions/checkout@v7

      - name: Install nightly (cargo-fuzz needs it)
        uses: dtolnay/rust-toolchain@nightly

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz -> target"

      - name: Fuzz ${{ matrix.target }}
        # cargo-fuzz defaults the fuzz target to its own build triple. The prebuilt
        # binary from install-action is musl-static, and sanitizers are incompatible
        # with a statically linked libc, so pin the target to the host gnu triple.
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            --target x86_64-unknown-linux-gnu -- \
            -max_total_time=${{ github.event.inputs.max_total_time || '120' }} \
            -rss_limit_mb=4096

      - name: Upload any crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-${{ matrix.target }}-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore
