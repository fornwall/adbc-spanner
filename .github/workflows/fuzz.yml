name: Fuzz

# Fuzzing is expensive, so it runs on a schedule (and on demand) rather than on every push.
# Each target seeds from the committed fuzz/seeds/<target> corpus, and the generated corpus is
# cached between runs (actions/cache below) so coverage accumulates instead of restarting from
# the seeds every night.
on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Seconds to fuzz each target"
        default: "1200"

# Least privilege: nothing in this workflow needs to write to the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [sql, values, like, options, keyword, params, partition]
    steps:
      - uses: actions/checkout@v7

      - name: Install nightly (cargo-fuzz needs it)
        # Third-party actions are pinned to a commit SHA (first-party actions/* stay on their
        # major tag) — a hijacked mutable tag would otherwise run in CI with repo read access.
        # dtolnay/rust-toolchain reads the toolchain from its ref name, so pinning the SHA
        # requires selecting the toolchain explicitly below.
        uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly branch, 2026-07-10
        with:
          toolchain: nightly

      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-fuzz

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "fuzz -> target"

      # Persist the generated corpus across runs so coverage accumulates. Cache keys are
      # immutable, so key on the run id: each run saves a fresh cache and restore-keys picks
      # the most recent previous one. (The save happens in this action's post step, which is
      # skipped if the job fails — a crashing input therefore never poisons the cache; it is
      # uploaded as an artifact below instead.)
      - name: Restore the accumulated corpus
        uses: actions/cache@v6
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Fuzz ${{ matrix.target }}
        # cargo-fuzz defaults the fuzz target to its own build triple. The prebuilt
        # binary from install-action is musl-static, and sanitizers are incompatible
        # with a statically linked libc, so pin the target to the host gnu triple.
        #
        # New units are written to the (gitignored, cache-persisted) corpus dir listed
        # first; the committed seed corpus is passed read-alongside so runs with a cold
        # cache still start with meaningful coverage. Not every target has seeds (e.g.
        # `options`).
        #
        # Expressions are passed through `env:` rather than interpolated into the script,
        # so no `${{ }}` value (in particular the workflow_dispatch input) is ever
        # substituted into shell source.
        env:
          FUZZ_TARGET: ${{ matrix.target }}
          MAX_TOTAL_TIME: ${{ github.event.inputs.max_total_time || '1200' }}
        run: |
          mkdir -p "fuzz/corpus/$FUZZ_TARGET"
          seeds="fuzz/seeds/$FUZZ_TARGET"
          [ -d "$seeds" ] || seeds=""
          cargo +nightly fuzz run "$FUZZ_TARGET" \
            --target x86_64-unknown-linux-gnu \
            "fuzz/corpus/$FUZZ_TARGET" ${seeds:+"$seeds"} -- \
            -max_total_time="$MAX_TOTAL_TIME" \
            -rss_limit_mb=4096

      - name: Upload any crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-${{ matrix.target }}-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

  # A scheduled fuzz failure otherwise surfaces only as an email, and a scheduled workflow that
  # keeps failing (or that nobody watches) auto-disables after 60 days of inactivity. Open — or
  # comment on an already-open — tracking issue so a nightly regression stays visible in the repo.
  # Only fires on the nightly `schedule` trigger, never on manual `workflow_dispatch` runs.
  report-failure:
    needs: fuzz
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    # Least privilege: only this job needs to write issues.
    permissions:
      issues: write
    steps:
      - name: Open or update the tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          label="nightly-fuzz-failure"
          title="Nightly fuzz run failed"
          # Idempotent: ensure the tracking label exists, then reuse an already-open issue instead
          # of opening a fresh one every night.
          gh label create "$label" --color B60205 \
            --description "Automated: a scheduled fuzz run failed" 2>/dev/null || true
          body="A scheduled [fuzz run]($RUN_URL) failed (commit ${GITHUB_SHA})."
          existing="$(gh issue list --state open --label "$label" --limit 1 --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --label "$label" --body "$body"
          fi
