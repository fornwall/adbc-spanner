name: ADBC validation

# Runs the canonical Apache Arrow ADBC C++ validation suite against the driver's
# C ABI (see adbc-validation/). Kept separate from the main CI job because it
# builds arrow-adbc + GoogleTest from source, which is slower than the Rust tests.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs (a rapid re-push cancels the in-flight run for the same
# ref); pushes to main are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: nothing in this workflow needs to write to the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validation:
    runs-on: ubuntu-latest

    # A Spanner emulator to validate against, same as the main CI job.
    services:
      spanner:
        image: gcr.io/cloud-spanner-emulator/emulator
        ports:
          - 9010:9010
          - 9020:9020

    env:
      SPANNER_EMULATOR_HOST: localhost:9010

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        # Third-party actions are pinned to a commit SHA (first-party actions/* stay on their
        # major tag) — a hijacked mutable tag would otherwise run in CI with repo read access.
        # dtolnay/rust-toolchain reads the toolchain from its ref name, so pinning the SHA
        # requires selecting the toolchain explicitly below.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, 2026-06-30
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Wait for the Spanner emulator
        run: |
          # Gate on a real admin-API response, not just the gRPC TCP port (which
          # opens ~1s early); the run script creates the instance/database over
          # this REST API.
          for _ in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' \
                http://localhost:9020/v1/projects/emulator/instanceConfigs)" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "Spanner emulator admin API did not become ready" >&2
          exit 1

      # Persist the C++ validation build tree (fetched + compiled arrow-adbc and
      # GoogleTest under .adbc-validation-build, plus our own harness objects) so the
      # slow FetchContent clone + compile is reused across runs. The key is bound to
      # the runner OS and a hash of adbc-validation/CMakeLists.txt — which carries the
      # pinned ARROW_ADBC_TAG and every CMake/toolchain flag — so bumping the arrow-adbc
      # rev (or any build flag) mints a fresh key.
      #
      # Deliberately NO restore-keys: a partial-key hit would restore a build tree
      # (including its CMakeCache.txt) from a run on the *old* arrow-adbc rev, and
      # FetchContent may then keep the stale checkout instead of re-fetching the new
      # tag — masking the rev bump and compiling against the wrong arrow-adbc source.
      # An exact key match is safe (same CMakeLists → same rev + flags); a rev bump
      # is an exact miss → empty tree → clean clone of the correct rev. The cost is a
      # cold rebuild of arrow-adbc + GoogleTest on each CMakeLists change, which is
      # rare (only rev/flag bumps) and worth the correctness guarantee.
      - name: Cache the ADBC C++ validation build tree
        uses: actions/cache@v6
        with:
          path: .adbc-validation-build
          key: adbc-validation-${{ runner.os }}-${{ hashFiles('adbc-validation/CMakeLists.txt') }}

      - name: Run the ADBC C++ validation suite (gated subset)
        run: scripts/run-adbc-validation.sh
