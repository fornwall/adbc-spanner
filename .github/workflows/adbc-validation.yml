name: ADBC validation

# Runs the canonical Apache Arrow ADBC C++ validation suite against the driver's
# C ABI (see adbc-validation/). Kept separate from the main CI job because it
# builds arrow-adbc + GoogleTest from source, which is slower than the Rust tests.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs (a rapid re-push cancels the in-flight run for the same
# ref); pushes to main are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: nothing in this workflow needs to write to the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validation:
    name: validation (${{ matrix.name }})
    runs-on: ubuntu-latest

    # Three legs over the SAME gate/expected-failure/stale checks:
    #   - plain      — fast, uninstrumented (the original run).
    #   - asan-ubsan — the whole C++ side built with gcc -fsanitize=address,undefined, driving the
    #                  (uninstrumented, stable) cdylib. ASan's process-wide malloc/free/memcpy
    #                  interceptors catch double-free / overflow / use-after-free on the C-ABI
    #                  structs the driver hands across the FFI boundary (release callbacks,
    #                  AdbcError private_data), plus UB in the C/C++ code. This catches only bugs
    #                  that reach a libc-allocator interceptor at the boundary.
    #   - rust-asan  — the cdylib ITSELF built with nightly Rust's -Zsanitizer=address (+ -Zbuild-std
    #                  so std is instrumented too), driven by a clang -fsanitize=address C++ side.
    #                  This is the piece the asan-ubsan leg cannot do: it catches memory bugs *inside*
    #                  Rust (out-of-bounds store, use-after-free on Rust-owned heap) that never touch
    #                  a malloc/free interceptor. The C++ side is built with clang (not the gcc
    #                  default) because Rust's -Zsanitizer=address uses LLVM compiler-rt ASan and the
    #                  two ASan runtimes must match in one process; UBSan is dropped on this leg's C++
    #                  side (no -Zsanitizer=undefined cdylib equivalent, and the asan-ubsan leg already
    #                  carries full C-side UB coverage), keeping the runtime match to just ASan.
    #                  This leg additionally runs a cross-boundary ASan CANARY before the suite (the
    #                  run script builds the cdylib with --cfg asan_canary and calls an intentionally-
    #                  out-of-bounds Rust symbol from a clang -fsanitize=address program against a
    #                  C++-allocated buffer): if ASan does NOT report the heap-buffer-overflow the
    #                  instrumentation is disarmed and the leg fails loudly, so a silent
    #                  -Zsanitizer=address regression can't leave it green as a no-op.
    # fail-fast: false so one leg failing does not cancel the others.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: plain
            sanitize: ""
            rust-sanitize: ""
            toolchain: stable
          - name: asan-ubsan
            sanitize: address,undefined
            rust-sanitize: ""
            toolchain: stable
          - name: rust-asan
            sanitize: address
            rust-sanitize: address
            toolchain: nightly

    # A Spanner emulator to validate against, same as the main CI job.
    services:
      spanner:
        image: gcr.io/cloud-spanner-emulator/emulator
        ports:
          - 9010:9010
          - 9020:9020

    env:
      SPANNER_EMULATOR_HOST: localhost:9010
      # Forwarded to scripts/run-adbc-validation.sh → -DSPANNER_VALIDATION_SANITIZE (C++ side).
      # Empty for the plain leg. Distinct build dir per leg so the flag sets never share a cache/tree.
      ADBC_VALIDATION_SANITIZE: ${{ matrix.sanitize }}
      # Non-empty (address) only on the rust-asan leg: instruments the cdylib itself via nightly
      # -Zsanitizer=address, and makes the script build the C++ side with clang for runtime matching.
      ADBC_VALIDATION_RUST_SANITIZE: ${{ matrix.rust-sanitize }}
      ADBC_VALIDATION_BUILD_DIR: ${{ github.workspace }}/.adbc-validation-build-${{ matrix.name }}

    steps:
      - uses: actions/checkout@v7

      # Two toolchain steps, one per matrix leg, so each can pin its OWN dtolnay/rust-toolchain
      # SHA (the action reads the toolchain from its ref name, so the SHA and the requested
      # toolchain must agree). Third-party actions are pinned to a commit SHA (first-party
      # actions/* stay on their major tag) — a hijacked mutable tag would otherwise run in CI
      # with repo read access. Expressions are deliberately NOT used in `uses:` (support is
      # patchy); a plain `if:` per leg keeps the SHA a literal.
      - name: Install Rust toolchain (stable)
        if: matrix.toolchain == 'stable'
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, 2026-06-30
        with:
          toolchain: stable

      - name: Install Rust toolchain (nightly, for the -Zsanitizer=address cdylib)
        # The rust-asan leg needs nightly for -Zsanitizer=address / -Zbuild-std, plus the rust-src
        # component so build-std can recompile+instrument the standard library.
        if: matrix.toolchain == 'nightly'
        uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly branch, 2026-07-10
        with:
          toolchain: nightly
          components: rust-src

      # Rust's -Zsanitizer=address links LLVM compiler-rt ASan; the C++ side must therefore be
      # built with clang so both share ONE runtime (gcc's libasan would abort at startup when
      # mixed). The run script defaults CC/CXX to clang when ADBC_VALIDATION_RUST_SANITIZE is set.
      - name: Install clang (compiler-rt ASan, to match the instrumented cdylib)
        if: matrix.rust-sanitize != ''
        run: sudo apt-get update && sudo apt-get install -y clang

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Wait for the Spanner emulator
        run: |
          # Gate on a real admin-API response, not just the gRPC TCP port (which
          # opens ~1s early); the run script creates the instance/database over
          # this REST API.
          for _ in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' \
                http://localhost:9020/v1/projects/emulator/instanceConfigs)" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "Spanner emulator admin API did not become ready" >&2
          exit 1

      # Persist the C++ validation build tree (fetched + compiled arrow-adbc and
      # GoogleTest under .adbc-validation-build, plus our own harness objects) so the
      # slow FetchContent clone + compile is reused across runs. The key is bound to
      # the runner OS, the matrix leg (plain / asan-ubsan / rust-asan build the same sources
      # with different flags — and rust-asan with a different compiler, clang vs gcc — so they
      # must NOT share a tree) and a hash of
      # adbc-validation/CMakeLists.txt — which carries the pinned ARROW_ADBC_TAG and every
      # CMake/toolchain flag — so bumping the arrow-adbc rev (or any build flag) mints a fresh key.
      #
      # Deliberately NO restore-keys: a partial-key hit would restore a build tree
      # (including its CMakeCache.txt) from a run on the *old* arrow-adbc rev, and
      # FetchContent may then keep the stale checkout instead of re-fetching the new
      # tag — masking the rev bump and compiling against the wrong arrow-adbc source.
      # An exact key match is safe (same CMakeLists → same rev + flags); a rev bump
      # is an exact miss → empty tree → clean clone of the correct rev. The cost is a
      # cold rebuild of arrow-adbc + GoogleTest on each CMakeLists change, which is
      # rare (only rev/flag bumps) and worth the correctness guarantee.
      - name: Cache the ADBC C++ validation build tree
        uses: actions/cache@v6
        with:
          path: ${{ env.ADBC_VALIDATION_BUILD_DIR }}
          key: adbc-validation-${{ runner.os }}-${{ matrix.name }}-${{ hashFiles('adbc-validation/CMakeLists.txt') }}

      - name: Run the ADBC C++ validation suite (gated subset)
        run: scripts/run-adbc-validation.sh
