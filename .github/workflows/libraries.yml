name: Shared libraries

# Build the loadable ADBC driver shared library for every supported platform.
# Artifacts are attached to each run (downloadable from the run's summary page),
# and, for tag pushes, also uploaded as assets on the corresponding GitHub Release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The Linux runners are pinned to 22.04 (glibc 2.35) because the wheels
          # built from these libraries are tagged manylinux_2_35 (see the
          # python-wheels job); a "Verify glibc requirement" step below fails the
          # build if the library ever needs newer glibc symbols than the tag
          # promises. To support older distros, switch to building inside a
          # manylinux container and lower the tags together.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            lib: libadbc_spanner.so
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            lib: libadbc_spanner.so
          # macos_deployment_target must match the macosx_* wheel tags in the
          # python-wheels job; a "Verify the minimum macOS" step below fails the
          # build if the library ever requires a newer macOS than the tag
          # promises. Change the two together. The floors mirror the
          # adbc-driver-manager wheels (10.15 x86-64 / 11.0 arm64) — the Python
          # package is unusable without it, so older would gain nothing.
          - target: aarch64-apple-darwin
            runner: macos-14
            lib: libadbc_spanner.dylib
            macos_deployment_target: "11.0"
          - target: x86_64-apple-darwin
            runner: macos-14 # cross-compiled from the arm64 runner (Apple toolchain is universal).
            lib: libadbc_spanner.dylib
            macos_deployment_target: "10.15"
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            lib: adbc_spanner.dll
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm # native ARM64 Windows; aws-lc-rs cross-compiles poorly, native is clean.
            lib: adbc_spanner.dll

    steps:
      - uses: actions/checkout@v7

      # Third-party actions in this workflow are pinned to commit SHAs: this job builds the
      # binaries that tagged releases attach and PyPI wheels bundle, so a hijacked mutable
      # tag/branch in any of them could tamper with what users download. The trailing comment
      # names the ref each SHA was resolved from.
      - name: Install Rust toolchain
        # dtolnay/rust-toolchain reads the toolchain from its ref name, so pinning the SHA
        # requires selecting the toolchain explicitly below.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, 2026-06-30
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # aws-lc-sys needs NASM to assemble on Windows x86-64. ARM64 Windows uses no NASM.
      - name: Install NASM (Windows x86-64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build shared library
        env:
          # On macOS, pin the minimum OS the library supports instead of inheriting it
          # from the host SDK — rustc, cc and aws-lc's cmake all honor this variable.
          # Empty (and read by nothing) on the other platforms.
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
        run: cargo build --release --target ${{ matrix.target }}

      # The Linux wheels are tagged manylinux_2_35, which promises pip that the
      # bundled library loads on any glibc >= 2.35 system. Enforce that promise:
      # fail if the built .so requires a newer glibc symbol version (e.g. after
      # a runner image bump), instead of shipping a wheel that installs fine on
      # Ubuntu 22.04 / Debian 12 and then fails at dlopen time.
      - name: Verify glibc requirement matches the manylinux_2_35 wheel tag
        if: contains(matrix.target, 'linux-gnu')
        run: |
          set -euo pipefail
          lib="target/${{ matrix.target }}/release/${{ matrix.lib }}"
          required="$(objdump -T "$lib" | { grep -oE 'GLIBC_[0-9]+(\.[0-9]+)+' || true; } \
            | sed 's/^GLIBC_//' | sort -uV | tail -1)"
          echo "highest glibc symbol version required by ${lib}: ${required}"
          if [ "$(printf '%s\n' "$required" 2.35 | sort -V | tail -1)" != "2.35" ]; then
            echo "::error::${{ matrix.lib }} requires glibc ${required}, which breaks the manylinux_2_35 wheel tag (see the python-wheels job)" >&2
            exit 1
          fi

      # Same promise-enforcement as the glibc check above, for the macosx_* wheel tags:
      # fail if the built dylib's minimum OS is newer than the deployment target (e.g. a
      # dependency's build system ignoring MACOSX_DEPLOYMENT_TARGET), instead of shipping
      # a wheel that installs fine and then fails at dlopen time on the OS the tag allows.
      - name: Verify the minimum macOS matches the wheel tag
        if: contains(matrix.target, 'apple-darwin')
        run: |
          set -euo pipefail
          lib="target/${{ matrix.target }}/release/${{ matrix.lib }}"
          expected="${{ matrix.macos_deployment_target }}"
          # Modern binaries carry LC_BUILD_VERSION (minos); binaries targeting old
          # x86_64 deployment targets get LC_VERSION_MIN_MACOSX (version) instead.
          minos="$(otool -l "$lib" | awk '/LC_BUILD_VERSION/{v=1} v && /minos/{print $2; exit}')"
          if [ -z "$minos" ]; then
            minos="$(otool -l "$lib" | awk '/LC_VERSION_MIN_MACOSX/{v=1} v && /version/{print $2; exit}')"
          fi
          echo "minimum macOS required by ${lib}: ${minos:-<none found>} (wheel tag promises ${expected})"
          if [ -z "$minos" ] || [ "$(printf '%s\n' "$minos" "$expected" | sort -V | tail -1)" != "$expected" ]; then
            echo "::error::${{ matrix.lib }} requires macOS ${minos:-unknown}, which breaks the macosx_${expected/./_} wheel tag (see the python-wheels job)" >&2
            exit 1
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="adbc-spanner-${{ matrix.target }}"
          mkdir -p "$staging" dist
          cp "target/${{ matrix.target }}/release/${{ matrix.lib }}" "$staging/"
          cp README.md LICENSE "$staging/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Include the MSVC import library for consumers that link at build time.
            cp "target/${{ matrix.target }}/release/adbc_spanner.dll.lib" "$staging/" 2>/dev/null || true
            7z a "dist/${staging}.zip" "$staging"
          else
            tar -czf "dist/${staging}.tar.gz" "$staging"
          fi
          ls -l dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: adbc-spanner-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download the platform library artifacts
        uses: actions/download-artifact@v8
        with:
          # Only the per-platform library archives the `build` job uploaded. Without this
          # pattern the step downloads *every* artifact of the run — and since `python-wheels`
          # runs concurrently (both jobs only need `build`), its `python-wheels` artifact could
          # land in dist/ depending on timing and be attached to the GitHub Release without
          # matching the `adbc-spanner-*` checksum glob below. Wheels are published to PyPI by
          # `python-publish`, not attached to the release.
          pattern: adbc-spanner-*
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          set -euo pipefail
          # One checksums file over every platform archive, so downstream
          # consumers can pin the driver by hash instead of trusting a mutable
          # release tag (verify with `sha256sum -c SHA256SUMS`). The glob matches
          # only the archives, never the SHA256SUMS file itself.
          sha256sum adbc-spanner-* > SHA256SUMS
          echo "Published checksums:"
          cat SHA256SUMS

      - name: Publish release assets
        # Pinned to a commit: this step runs with contents: write and publishes the release
        # assets users download — a hijacked v3 tag must not be able to replace them.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          # dist/* now also includes the generated SHA256SUMS file.
          files: dist/*
          generate_release_notes: true

  # Repackage the per-platform shared libraries built above into Python wheels.
  # No compilation happens here — a Spanner ADBC wheel is "data-only" (it ships
  # the prebuilt cdylib and links nothing against Python), so a single Linux
  # runner can stamp out every platform's wheel by forcing the platform tag.
  python-wheels:
    name: Python wheels
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          # Only drives `setup.py bdist_wheel` to repackage the prebuilt libraries;
          # the wheel tag is forced to py3-none-<platform>, so this version does not
          # affect the artifact. Pinned (not "3.x") for a reproducible release host.
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade setuptools wheel

      - name: Download platform libraries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Sync wheel version to the crate / tag
        shell: bash
        working-directory: python
        run: |
          set -euo pipefail
          # Single source of truth for the version is Cargo.toml; on a vX.Y.Z tag
          # the tag must match it. Fail loudly on drift so a release can't ship a
          # wheel whose version disagrees with the crate.
          crate_version="$(grep -m1 '^version' ../Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF#refs/tags/v}"
            if [[ "$tag_version" != "$crate_version" ]]; then
              echo "::error::tag v$tag_version != Cargo.toml version $crate_version" >&2
              exit 1
            fi
          fi
          echo "__version__ = \"${crate_version}\"" > adbc_driver_spanner/_version.py
          echo "wheel version: ${crate_version}"

      - name: Build wheels
        shell: bash
        working-directory: python
        run: |
          set -euo pipefail
          mkdir -p wheelhouse
          # target | lib filename | wheel platform tag.
          # NOTE: the manylinux tag matches the pinned ubuntu-22.04 build
          # runners (glibc 2.35), and the build job's "Verify glibc requirement"
          # step enforces it. Likewise the macosx tags match the build job's
          # macos_deployment_target values, enforced by its "Verify the minimum
          # macOS" step. If you change any of these tags, change the build job
          # (and its check) to match.
          rows=(
            "x86_64-unknown-linux-gnu|libadbc_spanner.so|manylinux_2_35_x86_64"
            "aarch64-unknown-linux-gnu|libadbc_spanner.so|manylinux_2_35_aarch64"
            "aarch64-apple-darwin|libadbc_spanner.dylib|macosx_11_0_arm64"
            "x86_64-apple-darwin|libadbc_spanner.dylib|macosx_10_15_x86_64"
            "x86_64-pc-windows-msvc|adbc_spanner.dll|win_amd64"
            "aarch64-pc-windows-msvc|adbc_spanner.dll|win_arm64"
          )
          for row in "${rows[@]}"; do
            IFS="|" read -r target lib plat <<< "$row"
            staging="adbc-spanner-${target}"
            work="$(mktemp -d)"
            if [ -f "../artifacts/${staging}.tar.gz" ]; then
              tar -xzf "../artifacts/${staging}.tar.gz" -C "$work"
            else
              unzip -q "../artifacts/${staging}.zip" -d "$work"
            fi
            # Exactly one platform's library must be present per wheel build.
            rm -f adbc_driver_spanner/*.so adbc_driver_spanner/*.dylib adbc_driver_spanner/*.dll
            cp "$work/${staging}/${lib}" adbc_driver_spanner/
            python setup.py bdist_wheel --plat-name "$plat"
            rm -rf build adbc_driver_spanner/*.so adbc_driver_spanner/*.dylib adbc_driver_spanner/*.dll
          done
          mv dist/*.whl wheelhouse/
          ls -l wheelhouse

      # Inspect the freshly built wheels before the irreversible python-publish
      # step (which needs: python-wheels) can ship them. All cheap and on the same
      # runner; catches a wheel that packages fine but is broken or empty.
      - name: Check wheel metadata and that each bundles its platform library
        shell: bash
        working-directory: python
        run: |
          set -euo pipefail
          python -m pip install --upgrade twine
          # Validate each wheel's metadata / long-description rendering.
          python -m twine check wheelhouse/*.whl
          # Assert the platform shared library is actually inside every wheel — a
          # data-only wheel with no library installs fine and then fails at runtime.
          for whl in wheelhouse/*.whl; do
            case "$whl" in
              *linux*) lib='adbc_driver_spanner/libadbc_spanner.so' ;;
              *macosx*) lib='adbc_driver_spanner/libadbc_spanner.dylib' ;;
              *win*) lib='adbc_driver_spanner/adbc_spanner.dll' ;;
              *) echo "::error::unrecognised wheel platform tag: ${whl}" >&2; exit 1 ;;
            esac
            if ! python -m zipfile -l "$whl" | grep -qF "$lib"; then
              echo "::error::${whl} does not bundle ${lib}" >&2
              python -m zipfile -l "$whl" >&2
              exit 1
            fi
            echo "OK: ${whl} bundles ${lib}"
          done

      - name: Install the built Linux wheel and smoke-test the import
        shell: bash
        run: |
          set -euo pipefail
          # Only the native (x86_64 Linux) wheel is installable on this runner, so
          # smoke-test that one. Install the actual built wheel — not the source
          # tree the unit-test job uses — to confirm the bundled library resolves.
          whl="$(ls python/wheelhouse/*manylinux_2_35_x86_64.whl)"
          python -m pip install "$whl"
          # Import from a directory without the source tree so the *installed*
          # package is exercised; _driver_path() raises unless the lib is bundled.
          cd "$RUNNER_TEMP"
          python -c "import adbc_driver_spanner; print(adbc_driver_spanner._driver_path()); import adbc_driver_spanner.dbapi"

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: python-wheels
          path: python/wheelhouse/*.whl
          if-no-files-found: error

  # Publish the wheels to PyPI on a vX.Y.Z tag via PyPI Trusted Publishing
  # (OIDC) — no API token or long-lived secret. Authentication is proven by the
  # short-lived `id-token` GitHub mints for this job, which must match the
  # trusted publisher configured on PyPI (owner + repo + this workflow filename
  # `libraries.yml` + the `pypi` environment below). See README/setup notes.
  python-publish:
    name: Publish wheels to PyPI
    needs: python-wheels
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adbc-driver-spanner
    permissions:
      id-token: write # mandatory for trusted publishing; nothing else needed.
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: python-wheels
          path: dist

      - name: Publish to PyPI
        # Pinned to a commit: this step holds the OIDC id-token for PyPI trusted publishing
        # and sees the wheels in plaintext — release/v1 is a mutable *branch*.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1, 2026-02-18
        with:
          # No username/password: presence of the OIDC token triggers the
          # trusted-publishing flow. PEP 740 attestations are generated by
          # default. skip-existing keeps re-runs idempotent.
          packages-dir: dist
          skip-existing: true
