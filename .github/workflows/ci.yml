name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs (a rapid re-push cancels the in-flight run for the same
# ref); pushes to main are never cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: nothing in this workflow needs to write to the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    # Run the Spanner emulator as a service container so the integration test has
    # a real Spanner to talk to.
    services:
      spanner:
        image: gcr.io/cloud-spanner-emulator/emulator
        ports:
          - 9010:9010
          - 9020:9020

    env:
      SPANNER_EMULATOR_HOST: localhost:9010
      # Make the emulator test gates fail LOUD (panic) instead of self-skipping if the target env
      # wiring above is ever dropped/misspelled in a refactor — otherwise the whole integration
      # suite would pass vacuously with zero behavioral coverage.
      ADBC_TEST_REQUIRE_TARGET: "1"

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        # Third-party actions are pinned to a commit SHA (first-party actions/* stay on their
        # major tag) — a hijacked mutable tag would otherwise run in CI with repo read access.
        # dtolnay/rust-toolchain reads the toolchain from its ref name, so pinning the SHA
        # requires selecting the toolchain explicitly below. Trailing comment names the ref.
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, 2026-06-30
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        # --all-features so the `fuzzing` helper module is linted too.
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Docs (deny warnings / broken links)
        env:
          RUSTDOCFLAGS: "-D warnings"
        # --all-features to match how docs.rs builds the docs.
        run: cargo doc --no-deps --all-features

      - name: Build without default features (ffi off)
        run: cargo build --no-default-features

      - name: Build the shared library (for the FFI smoke test)
        run: cargo build

      - name: Mock-server fault-injection tests
        # Fully offline, deterministic gRPC fault-injection suite (in-process mock
        # server) — needs no emulator, so run it before the emulator setup below.
        run: cargo test --test mock_spanner

      - name: Wait for the Spanner emulator
        run: |
          # Wait for the admin API to actually serve RPCs, not just for the gRPC
          # TCP port to open — the forwarded port accepts connections ~1s before
          # the emulator is ready, and starting the test that early makes its
          # create_instance fail silently ("Instance not found").
          for _ in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' \
                http://127.0.0.1:9020/v1/projects/emulator/instanceConfigs)" = "200" ]; then
              echo "emulator admin API is up"; exit 0
            fi
            sleep 1
          done
          echo "emulator did not become ready" >&2
          exit 1

      - name: Unit tests
        run: cargo test --lib

      - name: Doctests
        # Neither `--lib` nor `--all-targets` runs doctests, so run them
        # explicitly. --all-features so feature-gated examples compile too.
        run: cargo test --doc --all-features

      - name: Integration tests (Spanner emulator)
        run: cargo test --test integration

  # End-to-end test of the Python package (python/) against the emulator: build
  # the driver, drop it into the package exactly as the wheel job does, install
  # it, and exercise the whole DBAPI/Arrow surface (DDL, DML, ingest, manual
  # transactions) the way a real user would.
  python:
    name: Python package (emulator, py${{ matrix.python-version }})
    runs-on: ubuntu-latest

    # Run against the minimum supported Python (pyproject `requires-python`) and
    # the latest stable release, so both ends of the supported range stay green.
    # "3.x" is resolved by setup-python to the newest Python 3 available, so this
    # tracks new releases automatically without hardcoding the current version.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.x"]

    services:
      spanner:
        image: gcr.io/cloud-spanner-emulator/emulator
        ports:
          - 9010:9010
          - 9020:9020

    env:
      SPANNER_EMULATOR_HOST: localhost:9010
      # Fail loud (pytest.fail) rather than self-skip if the emulator env wiring is ever dropped, so
      # the Python end-to-end / oracle suites can't turn CI green with zero coverage.
      ADBC_TEST_REQUIRE_TARGET: "1"

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch, 2026-06-30
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build the driver shared library
        run: cargo build

      - name: Install the Python package with the freshly built driver
        run: |
          set -euo pipefail
          cp target/debug/libadbc_spanner.so python/adbc_driver_spanner/
          python -m pip install --upgrade pip
          # pyarrow/pandas/polars/duckdb exercise the Arrow + DataFrame paths, including the
          # README cookbook snippets that import them. google-cloud-spanner is the oracle for the
          # differential type-mapping test (test_differential_oracle.py).
          python -m pip install ./python pyarrow pandas polars duckdb pytest google-cloud-spanner

      - name: Wait for the Spanner emulator
        run: |
          for _ in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' \
                http://127.0.0.1:9020/v1/projects/emulator/instanceConfigs)" = "200" ]; then
              echo "emulator admin API is up"; exit 0
            fi
            sleep 1
          done
          echo "emulator did not become ready" >&2
          exit 1

      - name: End-to-end tests
        run: python -m pytest python/tests -v

  # Lint the workflow files themselves. The pinned Docker image bundles
  # actionlint plus its shellcheck/pyflakes integrations, so `run:` scripts are
  # checked too.
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint GitHub Actions workflows
        # Third-party Docker image pinned to its digest (a tag is mutable and could be re-pushed);
        # trailing comment names the tag the digest was resolved from.
        run: docker run --rm -v "${PWD}:/repo" --workdir /repo rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 -color # 1.7.12

  # Supply-chain + hygiene checks (no build / emulator needed):
  # cargo-deny — security advisories (RUSTSEC), license compliance, banned/duplicate
  #   crates and allowed sources (see deny.toml).
  # cargo-machete — unused dependencies.
  supply-chain:
    name: cargo-deny + machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check

      - uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2
        with:
          tool: cargo-machete

      - name: Unused dependencies
        run: cargo machete
